<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Complaint</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .card {
            max-width: 500px;
            margin: auto;
            margin-top: 80px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="card">
    <h2>📝 Create Complaint</h2>

    <form id="complaintForm">

        <input type="text" id="title" class="form-control mb-3" placeholder="Enter Title" required>

        <textarea id="description" class="form-control mb-3" placeholder="Enter Description" required></textarea>

        <select id="department" class="form-control mb-3" title="department" required>
                <option value="">Select Department</option>
        </select>
        <button type="submit" class="btn btn-primary w-100">Submit</button>

    </form>
</div>

<!-- 🔥 JS file connect -->
<script src="JavaScript/create-complaint.js"></script>

</body>
</html>
