<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(120deg,#4e73df,#224abe);
}

.card{
    width:400px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="card shadow p-4">

<h3 class="text-center mb-3">Create Account</h3>

<!-- 🔥 FORM ADD KIYA -->
<form onsubmit="register(event)">

<input id="name" class="form-control mb-3" placeholder="Full Name" required>

<input id="email" class="form-control mb-3" placeholder="Email" required>

<input id="password" type="password" class="form-control mb-3" placeholder="Password" required>

<select title="Role"   id="role" class="form-control mb-3">
<option value="USER">User</option>
<option value="ADMIN">Admin</option>
</select>

<!-- 🔥 BUTTON FIX -->
<button type="submit" class="btn btn-primary w-100">
Register
</button>

</form>

<p class="text-center mt-3">
Already have account? 
<a href="login.html">Login</a>
</p>

</div>

<script src="JavaScript/register.js"></script>

</body>
</html>
