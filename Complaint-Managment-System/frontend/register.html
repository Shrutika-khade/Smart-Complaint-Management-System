<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#4e73df,#224abe);
}

.card{
width:400px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="card shadow p-4">

<h3 class="text-center mb-3">Create Account</h3>

<input id="name" class="form-control mb-3" placeholder="Full Name">

<input id="email" class="form-control mb-3" placeholder="Email">

<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<select id="role" class="form-control mb-3" title="Role">
<option value="USER">User</option>
<option value="ADMIN">Admin</option>
</select>

<button type="button" onclick="register()" class="btn btn-primary w-100">
Register
</button>

<p class="text-center mt-3">
Already have account? 
<a href="login.html">Login</a>
</p>

</div>

<script src="JavaScrip/register.js"></script>

</body>
</html>
