<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>My Complaints</title>

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
    href="CSS/user-complaints.css">

</head>

<body>

    <!-- =========================
         SIDEBAR
    ========================== -->

    <aside class="sidebar">

        <!-- LOGO -->

        <div class="logo">

            <div class="logo-icon">
                <i class="fa-solid fa-comment"></i>
            </div>

            <div>
                <h2>Complaint</h2>
                <p>System</p>
            </div>

        </div>

        <!-- MENU -->

        <nav class="menu">

            <a href="dashboard.html">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>

            <a href="create-complaint.html">
                <i class="fa-solid fa-plus"></i>
                Create Complaint
            </a>

            <a class="active"
            href="user-complaints.html">

                <i class="fa-solid fa-rectangle-list"></i>
                My Complaints
            </a>

            <a href="#">
                <i class="fa-regular fa-bell"></i>
                Notifications

                <span class="badge">
                    3
                </span>
            </a>

            <a href="#">
                <i class="fa-regular fa-circle-question"></i>
                Help & Support
            </a>

            <a href="#"
            onclick="logout()">

                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>

        </nav>

        <!-- SIDEBAR CARD -->

        <div class="sidebar-card">

            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" alt="image1">

            <h3>Your voice</h3>

            <p>
                Matters to us
            </p>

        </div>

    </aside>


    <!-- =========================
         MAIN CONTENT
    ========================== -->

    <main class="main-content">

        <!-- TOPBAR -->

        <div class="topbar">

            <i class="fa-solid fa-bars menu-icon"></i>

            <div class="top-right">

                <div class="notification">

                    <i class="fa-regular fa-bell"></i>

                    <span>3</span>

                </div>

                <div class="profile">

                    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" alt="image2">

                    <span id="userName">
                        Priya Verma
                    </span>

                </div>

            </div>

        </div>

        <!-- PAGE TITLE -->

        <div class="page-title">

            <h1>
                My Complaints
            </h1>

            <p>
                Dashboard /
                My Complaints
            </p>

        </div>

        <!-- COMPLAINT LIST -->

        <div id="complaintContainer">

            <!-- JS DATA -->

        </div>

    </main>

    <!-- JS -->

    <script src="JavaScript/user-complaints.js"></script>

</body>
</html>
