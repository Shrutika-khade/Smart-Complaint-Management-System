<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
}
</style>

</head>

<body>

<div class="container mt-5 text-center">

<h2 id="welcome"></h2>

<div class="row mt-4">

<div class="col-md-4">
<div class="card p-3">
<h5>View All Complaints</h5>
<button onclick="goToAll()" class="btn btn-warning">Open</button>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Manage Users</h5>
<button onclick="goToUsers()" class="btn btn-info">Open</button>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Logout</h5>
<button onclick="logout()" class="btn btn-danger">Logout</button>
</div>
</div>

</div>

<div class="row mt-5">

  <div class="col-md-4">
    <div class="card p-3 shadow">
      <h5>Total Complaints</h5>
      <h3 id="total">0</h3>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card p-3 shadow bg-danger text-white">
      <h5>Open Complaints</h5>
      <h3 id="open">0</h3>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card p-3 shadow bg-success text-white">
      <h5>Resolved Complaints</h5>
      <h3 id="resolved">0</h3>
    </div>
  </div>

</div>

</div>

<script src="JavaScript/admin.js"></script>

</body>
</html>
