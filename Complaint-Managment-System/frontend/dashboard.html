<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
}

.card{
    border-radius:15px;
}
</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center text-white mb-4">Welcome to Dashboard 🚀</h2>

<div class="row">

<!-- Create Complaint -->
<div class="col-md-3">
<div class="card p-3 text-center shadow">
<h5>➕ Create Complaint</h5>
<button onclick="goToCreate()" class="btn btn-primary mt-2">Open</button>
</div>
</div>

<!-- My Complaints -->
<div class="col-md-3">
<div class="card p-3 text-center shadow">
<h5>📄 My Complaints</h5>
<button onclick="goToMy()" class="btn btn-success mt-2">View</button>
</div>
</div>

<!-- Admin Panel -->
<div class="col-md-3">
<div class="card p-3 text-center shadow">
<h5>👨‍💼 Admin Panel</h5>
<button onclick="goToAdmin()" class="btn btn-warning mt-2">Open</button>
</div>
</div>

<!-- Logout -->
<div class="col-md-3">
<div class="card p-3 text-center shadow">
<h5>🚪 Logout</h5>
<button onclick="logout()" class="btn btn-danger mt-2">Logout</button>
</div>
</div>

</div>

</div>

<script src="JavaScript/dashboard.js"></script>

</body>
</html>
