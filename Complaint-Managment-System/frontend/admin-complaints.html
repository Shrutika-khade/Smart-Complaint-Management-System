<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Admin Complaints</title>

    <!-- CSS -->
    <link rel="stylesheet"
    href="CSS/admin-complaints.css">

</head>

<body>

    <!-- PAGE TITLE -->

    <div class="page-header">

        <h1>All Complaints</h1>

        <p>
            Manage and monitor all complaints
        </p>

    </div>

    <!-- SEARCH -->

    <div class="search-wrapper">

        <input
        type="text"

        id="complaintSearch"

        placeholder="Search complaints..."

        class="search-box">

    </div>

    <!-- TABLE -->

    <div class="table-container">

        <table class="complaint-table">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Title</th>

                    <th>Description</th>

                    <th>Priority</th>

                    <th>Status</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="complaintTable">

            </tbody>

        </table>

    </div>

    <!-- JS -->

    <script src="JavaScript/admin-complaint.js"></script>

</body>

</html>
